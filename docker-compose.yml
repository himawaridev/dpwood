
services:
  # 1. DATABASE (Ở đây tôi ví dụ MySQL, nếu bạn dùng PostgreSQL thì đổi image thành postgres)
  db:
    image: mysql:8.0
    container_name: dpwood_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_strong_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dpwood_db}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql # Giữ lại dữ liệu DB ngay cả khi xóa container
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  # 2. BACKEND NODE.JS
  server:
    build: ./server
    container_name: dpwood_server
    restart: always
    ports:
      - "${SERVER_PORT:-5000}:5000"
    # 🔴 BẢO DOCKER ĐỌC THẲNG FILE .ENV CỦA SERVER
    env_file:
      - ./server/.env
    # Ghi đè các biến DB để trỏ sang Container DB local thay vì TiDB Cloud
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_SSL=false
      - DB_NAME=${MYSQL_DATABASE:-dpwood_db}
      - DB_USER=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-change_me_strong_password}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # 3. FRONTEND NEXT.JS
  client:
    build: ./client
    container_name: dpwood_client
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Next.js proxy gọi backend bằng DNS service trong Docker network.
      - BACKEND_API_URL=http://server:5000/api
    depends_on:
      server:
        condition: service_healthy

volumes:
  db_data: # Khai báo volume để lưu trữ Database vĩnh viễn
