name: Keep Render API Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-render-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping DPWOOD backend health endpoint
        run: |
          curl --fail --silent --show-error \
            --retry 3 --retry-delay 10 --max-time 90 \
            "https://dpwood.onrender.com/api/health?deep=true"
